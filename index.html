<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EKA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 72px;
      letter-spacing: 0.25em;
      color: #e8dcc8;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.18em;
      color: #8a8070;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .launching {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.2em;
      color: #c8784a;
      text-transform: uppercase;
      border: 0.5px solid rgba(200,120,74,0.3);
      padding: 10px 28px;
      border-radius: 40px;
    }
  </style>
</head>
<body>
  <div>
    <p class="logo">EKA</p>
    <p class="tagline">Deals worth keeping. Shop Easy.</p>
    <span class="launching">Launching very soon</span>
  </div>
</body>
</html>
